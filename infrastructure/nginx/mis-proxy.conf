server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
        return 302 /master/;
    }

    location /master/ {
        proxy_pass http://MASTER_PRIVATE_IP:30081/;
    }

    location /worker1/ {
        proxy_pass http://WORKER1_PRIVATE_IP:30082/;
    }

    location /worker2/ {
        proxy_pass http://WORKER2_PRIVATE_IP:30083/;
    }
}
