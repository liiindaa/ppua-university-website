apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-site
  template:
    metadata:
      labels:
        app: master-site
    spec:
      nodeSelector:
        kubernetes.io/hostname: s1-master
      initContainers:
        - name: fetch-site
          image: alpine:3.21
          imagePullPolicy: IfNotPresent
          env:
            - name: INSTANCE_NAME
              value: S1_Master
            - name: FULL_NAME
              value: Linda HEM
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache git
              git clone --depth 1 https://github.com/liiindaa/ppua-university-website.git /site
              rm -rf /site/.git
              sed -i "s|<body>|<body><div style=\"background:#E9A93D;color:#0F1C42;text-align:center;padding:12px 20px;font-family:Arial,sans-serif;font-weight:800;font-size:16px;position:relative;z-index:80\">This website is hosted by using Kubernetes - ${INSTANCE_NAME} - ${FULL_NAME}</div>|" /site/index.html
          volumeMounts:
            - name: site-files
              mountPath: /site
      containers:
        - name: nginx
          image: nginx:stable-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-files
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site-files
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: master-site
spec:
  type: NodePort
  selector:
    app: master-site
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
---
