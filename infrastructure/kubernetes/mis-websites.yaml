apiVersion: v1
kind: ConfigMap
metadata:
  name: master-site-content
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>S1_Master - MIS Midterm</title>
      <style>
        body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #eef3ff; color: #172554; }
        main { width: min(680px, 86vw); padding: 48px; background: white; border-radius: 18px; box-shadow: 0 18px 50px rgba(23, 37, 84, .14); }
        h1 { margin-top: 0; font-size: 2.2rem; }
        p { font-size: 1.2rem; line-height: 1.6; }
        strong { color: #1d4ed8; }
      </style>
    </head>
    <body>
      <main>
        <h1>This website is hosted by using Kubernetes.</h1>
        <p>Instance: <strong>S1_Master</strong></p>
        <p>Full Name: <strong>YOUR FULL NAME</strong></p>
      </main>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-site
  template:
    metadata:
      labels:
        app: master-site
    spec:
      nodeSelector:
        kubernetes.io/hostname: s1-master
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: site-content
          configMap:
            name: master-site-content
---
apiVersion: v1
kind: Service
metadata:
  name: master-site
spec:
  type: NodePort
  selector:
    app: master-site
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
---
